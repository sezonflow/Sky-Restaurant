<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Pool Bar Menu</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="style.css" rel="stylesheet">

    <style>
        html {
            background-color: #000; /* fallback canvas color only */
        }

        body {
            font-family: 'Outfit', sans-serif;
        }

        .hide-scroll::-webkit-scrollbar {
            display: none;
        }
        .hide-scroll {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Truly fixed background: locked to smallest possible viewport size
        (svh), so it never recalculates/jumps when the mobile URL bar
        shows or hides, and is completely decoupled from page content. */
        .bg-fixed-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100svh;
        }
    </style>
</head>
<body class="antialiased overflow-y-scroll">

    <div class="bg-fixed-layer -z-20 bg-[url('img/pool-bg.jpg')] bg-cover bg-center bg-no-repeat"></div>
    <div class="bg-fixed-layer -z-10 bg-black/75"></div>

    <div class="relative z-10 w-full min-h-dvh flex flex-col items-center pb-12">
        
        <div class="w-full md:max-w-2xl mx-auto px-5 flex flex-col items-center">
            
            <header class="pt-12 pb-10 text-center w-full flex flex-col items-center">
                <img src="img/Logo.svg" alt="Sky Logo" class="h-16 md:h-20 w-auto mb-3 object-contain drop-shadow-md">
                <p class="text-[#00A8E8] text-xs tracking-[0.35em] uppercase font-medium">Pool Bar Menu</p>
            </header>

            <div class="flex p-1 mb-10 w-full max-w-sm bg-white/10 backdrop-blur-md rounded-full border border-white/10">
                <button id="btn-food" class="flex-1 py-2.5 rounded-full bg-white text-black font-semibold text-sm transition-all duration-300 shadow-sm">
                    Храна
                </button>
                <button id="btn-drinks" class="flex-1 py-2.5 rounded-full text-white font-medium text-sm transition-all duration-300">
                    Пијалоци
                </button>
            </div>

            <div class="w-full mb-8 relative">
                <div id="category-container" class="flex overflow-x-auto gap-6 pb-2 hide-scroll snap-x snap-mandatory scroll-smooth">
                </div>
            </div>

            <main class="w-full flex flex-col" id="product-container">
            </main>

        </div>
    </div>

    <script src="pool-menu.js"></script>
</body>
</html>
