<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Pool Bar Menu</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="style.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            /* Magija: Gradijent i slika spojeni u jedno! Nema skakanja na skrol. */
            background-image: linear-gradient(to bottom, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0.95) 100%), url('img/pool-bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #000; /* Fallback boja */
        }

        .hide-scroll::-webkit-scrollbar {
            display: none;
        }
        .hide-scroll {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="antialiased text-gray-200">
    
    <div class="w-full flex flex-col items-center pb-12 min-h-screen">
        
        <div class="w-full md:max-w-2xl mx-auto px-5 flex flex-col items-center">
            
            <header class="pt-12 pb-10 text-center w-full flex flex-col items-center">
                <img src="img/Logo.svg" alt="Sky Logo" class="h-16 md:h-20 w-auto mb-3 object-contain drop-shadow-md">
                <p class="text-[#00A8E8] text-xs tracking-[0.35em] uppercase font-medium">Pool Bar Menu</p>
            </header>

            <div class="flex p-1 mb-10 w-full max-w-sm bg-white/10 backdrop-blur-md rounded-full border border-white/10">
                <button id="btn-food" class="flex-1 py-2.5 rounded-full bg-white text-black font-semibold text-sm transition-all duration-300 shadow-sm">
                    Храна
                </button>
                <button id="btn-drinks" class="flex-1 py-2.5 rounded-full text-white font-medium text-sm transition-all duration-300 hover:bg-white/5">
                    Пијалоци
                </button>
            </div>

            <div class="w-full mb-8 relative">
                <div id="category-container" class="flex overflow-x-auto gap-6 pb-2 hide-scroll snap-x snap-mandatory scroll-smooth">
                    </div>
            </div>

            <main class="w-full flex flex-col" id="product-container">
                </main>

        </div>
    </div>

    <script src="pool-menu.js"></script>
</body>
</html>
